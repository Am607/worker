name: lms-staging-deploy

on:
  repository_dispatch:
    types: [lms-deploy-staging]

concurrency:
  group: lms-staging-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/am607/lms_go
  PRIVATE_REPO: ${{ github.event.client_payload.repository }}
  SHA: ${{ github.event.client_payload.sha }}
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  ENVIRONMENT: staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate payload
        run: |
          set -euo pipefail
          case "$PRIVATE_REPO" in
            Am607/lms_go) ;;
            *) echo "unexpected repository: $PRIVATE_REPO"; exit 1 ;;
          esac
          case "$SHA" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *) echo "sha must be a full 40-char commit sha, got: $SHA"; exit 1 ;;
          esac
          case "$PR_NUMBER" in
            ''|*[!0-9]*) echo "invalid pr_number: $PR_NUMBER"; exit 1 ;;
          esac

      - name: Checkout private repo at commit
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ env.SHA }}
          token: ${{ secrets.LMS_PRIVATE_REPO_PAT }}
          fetch-depth: 1

      - name: Verify checked-out commit matches dispatched SHA
        run: |
          set -euo pipefail
          actual=$(git rev-parse HEAD)
          [ "$actual" = "$SHA" ] || { echo "checked out $actual, expected $SHA"; exit 1; }

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ env.SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

          
      - name: Debug workspace
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root:"
          ls -lah
          echo "Looking for compose files..."
          find . -type f | grep docker-compose || true
          

      - name: Copy docker-compose.staging.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || 22 }}
          source: "docker-compose.staging.yml"
          target: "/opt/lms_go"
          strip_components: 0

      - name: Deploy to Oracle VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_SSH_PORT || 22 }}
          envs: IMAGE,SHA,INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,LMS_INFISICAL_PROJECT_ID,INFISICAL_ENV_SLUG,GHCR_USER,GHCR_PAT
      
          script: |
            set -euo pipefail
      
            cd /opt/lms_go
      
            echo "== authenticating with Infisical =="
            export INFISICAL_TOKEN="$(
              infisical login \
                --method=universal-auth \
                --client-id="$INFISICAL_CLIENT_ID" \
                --client-secret="$INFISICAL_CLIENT_SECRET" \
                --plain
            )"
      
            echo "== generating fresh .env =="
            infisical export \
              --projectId="$LMS_INFISICAL_PROJECT_ID" \
              --env="$INFISICAL_ENV_SLUG" \
              --path="/lms_go" \
              --format=dotenv > .env
      
            echo "== logging into GHCR =="
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      
            export IMAGE="${IMAGE}:${SHA}"
      
            echo "Deploying image: $IMAGE"
      
            echo "== saving current image for rollback =="
            API_CONTAINER="$(docker compose -f docker-compose.staging.yml ps -q api || true)"
            PREVIOUS_IMAGE=""
      
            if [ -n "$API_CONTAINER" ]; then
              PREVIOUS_IMAGE="$(docker inspect --format='{{.Config.Image}}' "$API_CONTAINER" || true)"
            fi
      
            echo "Previous image: ${PREVIOUS_IMAGE:-<none>}"
      
            echo "== pulling new image =="
            docker compose -f docker-compose.staging.yml pull api
      
            echo "== starting database =="
            docker compose -f docker-compose.staging.yml up -d db
      
            echo "== waiting for database =="
            DB_CONTAINER="$(docker compose -f docker-compose.staging.yml ps -q db)"
      
            for i in $(seq 1 30); do
              STATUS="$(docker inspect --format='{{.State.Health.Status}}' "$DB_CONTAINER" 2>/dev/null || echo starting)"
      
              echo "DB health [$i]: $STATUS"
      
              if [ "$STATUS" = "healthy" ]; then
                break
              fi
      
              if [ "$i" -eq 30 ]; then
                echo "Database did not become healthy"
                exit 1
              fi
      
              sleep 2
            done
      
            echo "== compose image =="
            docker compose -f docker-compose.staging.yml config | grep image
      
            echo "== running database migration =="
            make migrate-up
      
            echo "== starting api =="
            docker compose -f docker-compose.staging.yml up -d --no-deps api
      
            echo "== waiting for api =="
            HEALTHY=0
      
            for i in $(seq 1 30); do
              if curl -fsS http://localhost:8080/api/v1/health >/dev/null; then
                HEALTHY=1
                break
              fi
      
              sleep 2
            done
      
            if [ "$HEALTHY" -ne 1 ]; then
              echo "Health check failed"
      
              if [ -n "$PREVIOUS_IMAGE" ]; then
                echo "Rolling back to $PREVIOUS_IMAGE"
                export IMAGE="$PREVIOUS_IMAGE"
                docker compose -f docker-compose.staging.yml up -d --no-deps api
              fi
      
              exit 1
            fi
      
            echo "== cleanup =="
            docker image prune -f
      
            echo "Deployment successful"
      
        env:
          IMAGE: ${{ env.IMAGE }}
          SHA: ${{ env.SHA }}
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          LMS_INFISICAL_PROJECT_ID: ${{ secrets.LMS_INFISICAL_PROJECT_ID }}
          INFISICAL_ENV_SLUG: staging
          GHCR_USER: Am607
          GHCR_PAT: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Comment deployment status on PR (success)
        if: success()
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.LMS_PRIVATE_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRIVATE_REPO}/issues/${PR_NUMBER}/comments" \
            -d "$(jq -cn --arg sha "$SHA" --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
                '{body: ("✅ Staging deploy succeeded for `" + $sha + "`\n\n" + $run)}')"

      - name: Comment deployment status on PR (failure)
        if: failure()
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.LMS_PRIVATE_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRIVATE_REPO}/issues/${PR_NUMBER}/comments" \
            -d "$(jq -cn --arg sha "$SHA" --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
                '{body: ("❌ Staging deploy failed for `" + $sha + "` (rolled back if a previous image existed)\n\n" + $run)}')"
