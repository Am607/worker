name: SOAI Backend Prod Deploy

"on":
  repository_dispatch:
    types: [soai-backend-prod-deploy]
  workflow_dispatch: {}

jobs:
  build-push:
    name: Build image & push to DOCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.repository }}
          ref: ${{ github.event.client_payload.ref }}
          token: ${{ secrets.SOAI_PRIVATE_REPO_PAT }}

      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ secrets.SOAI_INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /backend
          export-type: env

      - name: Prepare registry inputs
        id: registry
        shell: bash
        run: |
          : "${DIGITALOCEAN_ACCESS_TOKEN:?missing DIGITALOCEAN_ACCESS_TOKEN from Infisical}"
          : "${DOCR_REGISTRY:?missing DOCR_REGISTRY from Infisical}"
          echo "registry=$DOCR_REGISTRY" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to DigitalOcean Container Registry
        shell: bash
        run: |
          echo "$DIGITALOCEAN_ACCESS_TOKEN" | docker login registry.digitalocean.com -u "$DIGITALOCEAN_ACCESS_TOKEN" --password-stdin

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.digitalocean.com/${{ steps.registry.outputs.registry }}/soai-backend:latest
            registry.digitalocean.com/${{ steps.registry.outputs.registry }}/soai-backend:${{ github.event.client_payload.sha || github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Fetch code, pull image & restart on droplet
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.SOAI_INFISICAL_PROJECT_SLUG }}
          env-slug: prod
          secret-path: /backend
          export-type: env

      - name: Prepare SSH key
        id: ssh
        shell: bash
        run: |
          : "${DROPLET_HOST:?missing DROPLET_HOST from Infisical}"
          : "${DROPLET_USER:?missing DROPLET_USER from Infisical}"
          : "${DROPLET_SSH_KEY:?missing DROPLET_SSH_KEY from Infisical}"
          : "${DROPLET_APP_DIR:?missing DROPLET_APP_DIR from Infisical}"

          key_path="$RUNNER_TEMP/soai_deploy_key"
          printf '%b\n' "$DROPLET_SSH_KEY" > "$key_path"
          chmod 600 "$key_path"

          if ! grep -q 'BEGIN .*PRIVATE KEY' "$key_path"; then
            echo "::error::DROPLET_SSH_KEY must be the full private key, not the .pub key."
            exit 1
          fi

          {
            echo "host=$DROPLET_HOST"
            echo "username=$DROPLET_USER"
            echo "key_path=$key_path"
          } >> "$GITHUB_OUTPUT"

      - name: SSH in, fetch code, pull the latest image, restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ steps.ssh.outputs.username }}
          key_path: ${{ steps.ssh.outputs.key_path }}
          envs: DIGITALOCEAN_ACCESS_TOKEN,DROPLET_APP_DIR
          script: |
            set -euo pipefail
            : "${DROPLET_APP_DIR:?missing DROPLET_APP_DIR}"
            cd "$DROPLET_APP_DIR"
            if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "DROPLET_APP_DIR must point to the cloned repo. Current value: $DROPLET_APP_DIR"
              ls -la "$DROPLET_APP_DIR"
              exit 1
            fi
            git fetch --prune origin
            git pull --ff-only
            test -f docker-compose.yml || test -f compose.yml

            if ! test -r /etc/infisical.env; then
              echo "/etc/infisical.env is not readable by $(whoami). Fix ownership/permissions or deploy as a user that can read it."
              exit 1
            fi
            set -a
            . /etc/infisical.env
            set +a
            : "${INFISICAL_CLIENT_ID:?missing INFISICAL_CLIENT_ID in /etc/infisical.env}"
            : "${INFISICAL_CLIENT_SECRET:?missing INFISICAL_CLIENT_SECRET in /etc/infisical.env}"
            : "${INFISICAL_PROJECT_ID:?missing INFISICAL_PROJECT_ID in /etc/infisical.env}"

            export INFISICAL_DISABLE_UPDATE_CHECK=true
            export INFISICAL_TOKEN="$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --plain --silent)"
            infisical export --silent --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=prod --path=/backend --format=dotenv > .env.tmp
            mv .env.tmp .env
            chmod 600 .env

            echo "$DIGITALOCEAN_ACCESS_TOKEN" | docker login registry.digitalocean.com -u "$DIGITALOCEAN_ACCESS_TOKEN" --password-stdin
            docker compose pull app
            docker compose up -d
            docker image prune -f

      - name: Deploy succeeded
        if: success()
        run: echo "::notice::SOAI backend deploy succeeded (commit ${{ github.event.client_payload.sha || github.sha }})"

      - name: Deploy failed
        if: failure()
        run: echo "::error::SOAI backend deploy failed (commit ${{ github.event.client_payload.sha || github.sha }})"
