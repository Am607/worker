name: soai-backend-staging-deploy

on:
  repository_dispatch:
    types: [soai-deploy-staging]

concurrency:
  group: soai-staging-deploy-${{ github.event.client_payload.pr_number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PRIVATE_REPO: ${{ github.event.client_payload.repository }}
  SHA: ${{ github.event.client_payload.sha }}
  PR_NUMBER: ${{ github.event.client_payload.pr_number }}
  PR_BRANCH: ${{ github.event.client_payload.branch }}

jobs:
  validate-payload:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate payload
        run: |
          set -euo pipefail
          case "$PRIVATE_REPO" in
            Am607/soai-backend) ;;
            *) echo "unexpected repository: $PRIVATE_REPO"; exit 1 ;;
          esac
          case "$SHA" in
            [0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]) ;;
            *) echo "sha must be a full 40-char commit sha, got: $SHA"; exit 1 ;;
          esac
          case "$PR_NUMBER" in
            ''|*[!0-9]*) echo "invalid pr_number: $PR_NUMBER"; exit 1 ;;
          esac

  deploy:
    needs: validate-payload
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from Infisical
        uses: Infisical/secrets-action@v1.0.7
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: staging
          secret-path: /backend
          export-type: env

      - name: Prepare SSH key
        id: ssh
        shell: bash
        run: |
          : "${DROPLET_HOST:?missing DROPLET_HOST from Infisical (env=staging)}"
          : "${DROPLET_USER:?missing DROPLET_USER from Infisical (env=staging)}"
          : "${DROPLET_SSH_KEY:?missing DROPLET_SSH_KEY from Infisical (env=staging)}"
          : "${DROPLET_APP_DIR:?missing DROPLET_APP_DIR from Infisical (env=staging)}"
          : "${SERVICE_NAME:?missing SERVICE_NAME from Infisical (env=staging)}"

          key_path="$RUNNER_TEMP/soai_staging_deploy_key"
          printf '%b\n' "$DROPLET_SSH_KEY" > "$key_path"
          chmod 600 "$key_path"

          if ! grep -q 'BEGIN .*PRIVATE KEY' "$key_path"; then
            echo "::error::DROPLET_SSH_KEY must be the full private key, not the .pub key."
            exit 1
          fi

          {
            echo "host=$DROPLET_HOST"
            echo "username=$DROPLET_USER"
            echo "key_path=$key_path"
          } >> "$GITHUB_OUTPUT"

      - name: SSH in, checkout PR SHA, build, restart
        uses: appleboy/ssh-action@v1
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          SHA: ${{ env.SHA }}
          PR_BRANCH: ${{ env.PR_BRANCH }}
        with:
          host: ${{ steps.ssh.outputs.host }}
          username: ${{ steps.ssh.outputs.username }}
          key_path: ${{ steps.ssh.outputs.key_path }}
          envs: DROPLET_APP_DIR,SERVICE_NAME,PR_NUMBER,SHA,PR_BRANCH
          command_timeout: 30m
          script: |
            set -euo pipefail
            : "${DROPLET_APP_DIR:?missing DROPLET_APP_DIR}"
            : "${SERVICE_NAME:?missing SERVICE_NAME}"
            cd "$DROPLET_APP_DIR"

            if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
              echo "DROPLET_APP_DIR must point to a cloned repo. Current value: $DROPLET_APP_DIR"
              ls -la "$DROPLET_APP_DIR"
              exit 1
            fi

            # Fetch the exact PR head ref. `refs/pull/<n>/head` works even
            # for forks and avoids needing the branch in our remote ns.
            git fetch --prune origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr-${PR_NUMBER}"
            git checkout --detach "$SHA"
            echo "Checked out PR #${PR_NUMBER} (${PR_BRANCH}) at ${SHA}"

            # Refresh .env from Infisical (staging env). Same bootstrap
            # layout as prod so the deploy user can read it without any
            # per-PR setup.
            if ! test -r /etc/infisical.env; then
              echo "/etc/infisical.env is not readable by $(whoami)."
              exit 1
            fi
            set -a
            . /etc/infisical.env
            set +a
            : "${INFISICAL_CLIENT_ID:?missing INFISICAL_CLIENT_ID in /etc/infisical.env}"
            : "${INFISICAL_CLIENT_SECRET:?missing INFISICAL_CLIENT_SECRET in /etc/infisical.env}"
            : "${INFISICAL_PROJECT_ID:?missing INFISICAL_PROJECT_ID in /etc/infisical.env}"

            export INFISICAL_DISABLE_UPDATE_CHECK=true
            export INFISICAL_TOKEN="$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --plain --silent)"
            infisical export --silent --token="$INFISICAL_TOKEN" --projectId="$INFISICAL_PROJECT_ID" --env=staging --path=/backend --format=dotenv > .env.tmp
            mv .env.tmp .env
            chmod 600 .env

            # Make sure Postgres is up before the app talks to it. The
            # overlay publishes the db port to 127.0.0.1 so the bare-metal
            # systemd app can reach the container. Idempotent: docker
            # compose leaves a healthy container alone.
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d db
            for i in $(seq 1 30); do
              status=$(docker inspect --format '{{.State.Health.Status}}' "$(docker compose -f docker-compose.yml -f docker-compose.staging.yml ps -q db)" 2>/dev/null || echo "starting")
              [ "$status" = "healthy" ] && break
              echo "waiting for db (status=$status)..."
              sleep 2
            done

            # Incremental build against the server's warm target/.
            # --locked guards against silent Cargo.lock drift.
            #
            # SSH non-interactive shells skip ~/.profile, so rustup's PATH
            # entry isn't there by default. Source the env file rustup
            # installs (~/.cargo/env) if present, otherwise fall back to
            # the conventional path so a missing toolchain surfaces with a
            # clear error rather than "command not found".
            export CARGO_TERM_COLOR=always
            if [ -f "$HOME/.cargo/env" ]; then
              # shellcheck disable=SC1091
              . "$HOME/.cargo/env"
            else
              export PATH="$HOME/.cargo/bin:$PATH"
            fi
            command -v cargo >/dev/null || {
              echo "cargo not on PATH after sourcing ~/.cargo/env"
              echo "Install rustup as $(whoami): curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y"
              exit 1
            }
            cargo build --release --locked

            # systemd unit ExecStart points at target/release/soai-backend
            # so restart is a hot-swap. is-active gates failure reporting.
            sudo systemctl restart "$SERVICE_NAME"
            sudo systemctl is-active --quiet "$SERVICE_NAME"

  notify-pr:
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Comment deployment status on PR (success)
        if: needs.deploy.result == 'success'
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.SOAI_PRIVATE_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRIVATE_REPO}/issues/${PR_NUMBER}/comments" \
            -d "$(jq -cn --arg sha "$SHA" --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
                '{body: ("Staging deploy succeeded for `" + $sha + "`\n\n" + $run)}')"

      - name: Comment deployment status on PR (failure)
        if: needs.deploy.result != 'success'
        run: |
          set -euo pipefail
          curl -fsS -X POST \
            -H "Authorization: token ${{ secrets.SOAI_PRIVATE_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${PRIVATE_REPO}/issues/${PR_NUMBER}/comments" \
            -d "$(jq -cn --arg sha "$SHA" --arg run "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
                '{body: ("Staging deploy failed. Run logs: " + $run)}')"
